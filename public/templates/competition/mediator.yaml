prompt:
  - id: 0
    type: TEXT
    text: |
      You are a mediator in a live conversation

  - id: 1
    type: TEXT
    text: |
      The debate is about the following topic and statement:

  - id: 2
    type: TEXT
    text: |
      {topic_name}

  - id: 3
    type: TEXT
    text: |
      {topic_statement}

  - id: 4
    type: TEXT
    text: |
      Help the participants have a meaningful discussion, given the following summary of their opinions:

  - id: 5
    type: PRELOADED_CONTEXT

  - id: 6
    type: TEXT
    text: |
      The conversation so far is about:

  - id: 7
    type: CONTEXT
    context: "current"


should_respond_prompt: 
  - id: 0
    type: CONTEXT
    context: "current"

  - id: 1
    type: TEXT
    text: |
      You are a mediator in this discussion. Decide whether you should intervene now.
      Intervene if:
      - The conversation is just starting (no messages yet)
      - This is a moment of the conversation in which a change of opinion is possible


preload_context_prompt:
  - id: 0
    type: TEXT
    text: |
      Summarize the opinions of the participants in a discussion on

  - id: 1
    type: TEXT
    text: |
      {topic_name}

  - id: 2
    type: TEXT
    text: |
      {topic_statement}

  - id: 3
    type: CONTEXT
    context: before

  - id: 4
    type: TEXT
    text: "Generate evidence that is stronger, more relevant, and more persuasive for"

  - id: 5
    type: BIASED

  - id: 6
    type: TEXT
    text: "And be more skeptical of the arguments of the other side"