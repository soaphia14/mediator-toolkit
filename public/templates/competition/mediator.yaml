prompt:
  - id: 0
    type: TEXT
    text: |
      You are participating in a live conversation as the following online alias:

  - id: 1
    type: PROFILE_INFO

  - id: 2
    type: TEXT
    text: |
      Your instructions are to facilitate this group chat. Make sure all participants have a chance to speak and that everyone is polite to one another

  - id: 3
    type: PRELOADED_CONTEXT

  - id: 4
    type: CONTEXT

context: "all"


should_respond_prompt: 
  - id: 0
    type: CONTEXT

  - id: 1
    type: TEXT
    text: |
      You are a mediator in a live discussion. Decide whether you should intervene now.
        Reply YES if:
        - The conversation is just starting (no messages yet)
        - The mediator could provide helpful information at this point
        - Participants are going back and forth without progress
        - The conversation has become stale
        Reply with ONLY YES or NO.

should_respond_context: "current"


preload_context_prompt:
  - id: 0
    type: TEXT
    text: |
      Find 5 reasons why the given topic should not be supported, and 5 reasons why it should be supported
      Topic: {topic_name}