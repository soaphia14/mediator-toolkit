persona:
  id: mediator
  name: Mediator
  avatar: "🤖"
  pronouns: null
model:
  apiType: GEMINI
  modelName: gemini-3-flash-preview
generation:
  temperature: 0.7
  reasoning_level: "off"
  include_reasoning: false
chat_settings:
  min_messages_before_responding: 0
  can_self_trigger_calls: true
  initial_message: ""
  words_per_minute: 0
include_scaffolding_in_prompt: true
min_participant_messages_before_responding: 3
concede_strength: 0
num_retries: 2
context: "all"
structured_output:
  enabled: true
  append_to_prompt: false
  should_respond_field: null
  message_field: response
  explanation_field: explanation
  ready_to_end_field: readyToEndChat
  schema:
    explanation:
      type: STRING
      description: "1–2 sentences explaining your message or silence."
    response:
      type: STRING
      description: "Your chat message."
    readyToEndChat:
      type: BOOLEAN
      description: "Whether you are ready to end the conversation."


should_respond_prompt: 
  - id: 0
    type: CONTEXT

  - id: 1
    type: TEXT
    text: |
        You are a mediator in a live discussion. Decide whether you should intervene now.
        Reply if:
        - The conversation is just starting (no messages yet)
        - If there was no intervention for the **last 7 messages**
        - The mediator could provide helpful information at this point
        - Participants are going back and forth without progress
        - The conversation has become stale

should_respond_context: "current"


preload_context_prompt:
  - id: 0
    type: CONTEXT

  - id: 1
    type: TEXT
    text: |
      Find 5 reasons why the given topic should not be supported, and 5 reasons why it should be supported
      Topic: {topic_name}

preload_context_context: "all"