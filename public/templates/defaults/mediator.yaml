persona:
  id: mediator
  name: Mediator
  avatar: "🤖"
  pronouns: null
model:
  apiType: GEMINI
  modelName: gemini-3-flash-preview
generation:
  temperature: 0.7
  reasoning_level: "off"
  include_reasoning: false
chat_settings:
  min_messages_before_responding: 0
  can_self_trigger_calls: true
  initial_message: ""
  words_per_minute: 0
include_scaffolding_in_prompt: true
min_participant_messages_before_responding: 3
concede_strength: 0
num_retries: 2
context: "all"
structured_output:
  enabled: true
  append_to_prompt: false
  should_respond_field: null
  message_field: response
  explanation_field: explanation
  ready_to_end_field: readyToEndChat
  schema:
    explanation:
      type: STRING
      description: "1–2 sentences explaining your message or silence."
    response:
      type: STRING
      description: "Your chat message."
    readyToEndChat:
      type: BOOLEAN
      description: "Whether you are ready to end the conversation."

prompt:
  - id: 0
    type: TEXT
    text: |
      You are a mediator in a live conversation as the following online alias

  - id: 1
    type: PROFILE_INFO

  - id: 2
    type: TEXT
    text: |
      The debate is about the following question:

  - id: 3
    type: TEXT
    text: |
      {topic_name}

  - id: 4
    type: TEXT
    text: |
      Help the participants have a meaningful discussion, given the following summary of their opinions:

  - id: 5
    type: PRELOADED_CONTEXT

  - id: 6
    type: TEXT
    text: |
      The conversation so far is about:

  - id: 7
    type: CONTEXT
    context: "all"


should_respond_prompt: 
  - id: 0
    type: CONTEXT
    context: "current"

  - id: 1
    type: TEXT
    text: |
      You are a mediator in this discussion. Decide whether you should intervene now.
      Intervene if:
      - The conversation is just starting (no messages yet)
      - This is a moment of the conversation in which a change of opinion is possible


preload_context_prompt:
  - id: 0
    type: TEXT
    text: |
      Summarize the opinions of the participants in a discussion on

  - id: 1
    type: TEXT
    text: |
      {topic_name}

  - id: 2
    type: CONTEXT
    context: before
